<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 682" width="1000" height="682" role="img" aria-label="Illustrative Shipworthy readiness report showing NOT READY with two fixes required before ship, follow-up fixes, proof gaps, passed paths, a coverage map, and an orchestration checkpoint">
  <defs>
    <linearGradient id="rbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0B1020"/><stop offset="1" stop-color="#0A0E1B"/>
    </linearGradient>
    <linearGradient id="rcov" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34D399"/><stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <style>
      .sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    </style>
  </defs>

  <rect width="1000" height="682" rx="16" fill="url(#rbg)"/>
  <rect x="1" y="1" width="998" height="680" rx="15" fill="none" stroke="#1A2438" stroke-width="1.5"/>

  <!-- window chrome -->
  <path d="M0 16 Q0 0 16 0 L984 0 Q1000 0 1000 16 L1000 48 L0 48 Z" fill="#0E1526"/>
  <circle cx="30" cy="24" r="6" fill="#F43F5E"/><circle cx="52" cy="24" r="6" fill="#F59E0B"/><circle cx="74" cy="24" r="6" fill="#34D399"/>
  <text x="110" y="29" class="mono" font-size="13.5" fill="#6E7EA0">shipworthy · readiness report — checkout</text>
  <g transform="translate(872,13)"><rect width="104" height="24" rx="12" fill="#0E1830" stroke="#26355A"/><circle cx="18" cy="12" r="3.5" fill="#34D399"/><text x="30" y="16" class="sans" font-size="11.5" font-weight="600" fill="#9FB0CE">read-only</text></g>
  <line x1="0" y1="48" x2="1000" y2="48" stroke="#1A2438"/>

  <!-- verdict -->
  <text x="36" y="92" class="sans" font-size="12.5" font-weight="700" letter-spacing="2.5" fill="#6C7C9E">READINESS</text>
  <g transform="translate(36,104)">
    <rect width="214" height="52" rx="12" fill="#2A1220" stroke="#7F2740"/>
    <circle cx="30" cy="26" r="8" fill="#F43F5E"/>
    <text x="50" y="34" class="sans" font-size="24" font-weight="800" fill="#FB7185" letter-spacing="0.5">NOT READY</text>
  </g>
  <text x="270" y="126" class="sans" font-size="13.2" fill="#96A4C2">2 fixes required before ship · 2 next fixes · 1 proof gap · 1 passed path</text>
  <text x="270" y="148" class="sans" font-size="12.5" fill="#5F6E90">nothing is called &quot;ready&quot; without evidence</text>

  <!-- blocker 1 -->
  <g transform="translate(36,182)">
    <rect width="928" height="98" rx="11" fill="#0E1424" stroke="#242F49"/>
    <rect width="5" height="98" rx="2.5" fill="#F43F5E"/>
    <circle cx="26" cy="30" r="6.5" fill="#F43F5E"/>
    <text x="42" y="35" class="sans" font-size="15.5" font-weight="700" fill="#E6ECF7">Clear Before Ship <tspan fill="#8EA0C1" font-weight="500">guest · mobile —</tspan> payment succeeds in the UI, fails on the server</text>
    <text x="42" y="60" class="mono" font-size="12.5" fill="#7F8FB1">evidence:  POST /api/pay → 500 (network trace); UI still advances to &quot;Thank you&quot;</text>
    <text x="42" y="82" class="mono" font-size="12.5" fill="#7F8FB1">fix:  gate the success screen on a 2xx + persisted order id  —  verify by forcing a 500</text>
  </g>

  <!-- blocker 2 -->
  <g transform="translate(36,294)">
    <rect width="928" height="76" rx="11" fill="#0E1424" stroke="#242F49"/>
    <rect width="5" height="76" rx="2.5" fill="#F43F5E"/>
    <circle cx="26" cy="28" r="6.5" fill="#F43F5E"/>
    <text x="42" y="33" class="sans" font-size="15.5" font-weight="700" fill="#E6ECF7">Clear Before Ship <tspan fill="#8EA0C1" font-weight="500">missing path —</tspan> no way to cancel an order after purchase</text>
    <text x="42" y="58" class="mono" font-size="12.5" fill="#7F8FB1">evidence:  full surface map — no route/button/setting reaches it   ·   fix: add cancel on order-detail</text>
  </g>

  <!-- coverage -->
  <text x="36" y="406" class="sans" font-size="12.5" font-weight="700" letter-spacing="2" fill="#6C7C9E">COVERAGE · 34 DISCOVERED PATHS</text>
  <g transform="translate(36,418)">
    <rect x="0"   y="0" width="486" height="16" rx="4" fill="url(#rcov)"/>
    <rect x="490" y="0" width="139" height="16" rx="4" fill="#3B82F6" opacity="0.85"/>
    <rect x="633" y="0" width="70"  height="16" rx="4" fill="#F59E0B" opacity="0.9"/>
    <rect x="707" y="0" width="46"  height="16" rx="4" fill="#F43F5E" opacity="0.55"/>
    <rect x="757" y="0" width="24"  height="16" rx="4" fill="#F43F5E" opacity="0.85"/>
    <rect x="785" y="0" width="143" height="16" rx="4" fill="#334155"/>
  </g>
  <g class="sans" font-size="12.5" transform="translate(36,452)">
    <circle cx="5" cy="6" r="4.5" fill="#34D399"/><text x="17" y="10" fill="#8D9BBB">Tried + evidenced 21</text>
    <circle cx="172" cy="6" r="4.5" fill="#3B82F6"/><text x="184" y="10" fill="#8D9BBB">Spot-checked 6</text>
    <circle cx="326" cy="6" r="4.5" fill="#F59E0B"/><text x="338" y="10" fill="#8D9BBB">Blocked 3</text>
    <circle cx="442" cy="6" r="4.5" fill="#F43F5E" opacity="0.6"/><text x="454" y="10" fill="#8D9BBB">Skipped 2</text>
    <circle cx="548" cy="6" r="4.5" fill="#F43F5E"/><text x="560" y="10" fill="#8D9BBB">Missing 1</text>
    <circle cx="650" cy="6" r="4.5" fill="#334155"/><text x="662" y="10" fill="#8D9BBB">Proof missing 1</text>
  </g>

  <!-- checkpoint -->
  <g transform="translate(36,486)">
    <rect width="928" height="118" rx="11" fill="#0C1220" stroke="#1E2840"/>
    <text x="20" y="30" class="sans" font-size="12.5" font-weight="700" letter-spacing="2" fill="#6C7C9E">ORCHESTRATION CHECKPOINT</text>
    <text x="20" y="56" class="mono" font-size="12.5" fill="#8494B6">lanes:  ship-deep-review · ship-product-workflows · ship-workflow-clarity</text>
    <text x="20" y="80" class="mono" font-size="12.5" fill="#8494B6">auth:   yes   ·   mode: 5 lane agents   ·   verifier: <tspan fill="#34D399">Opus → APPROVED</tspan></text>
    <text x="20" y="104" class="mono" font-size="12.5" fill="#8494B6">omitted: load test (no safe env) → logged as <tspan fill="#F0B67A">evidence debt</tspan>, NOT as &quot;passed&quot;</text>
  </g>

  <text x="500" y="642" text-anchor="middle" class="sans" font-size="12" fill="#556488">Illustrative example — the report format is real; the contents are a sample, not a live run.</text>
</svg>
